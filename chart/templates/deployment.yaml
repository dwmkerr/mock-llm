apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mock-llm.fullname" . }}
  labels:
    {{- include "mock-llm.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "mock-llm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mock-llm.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mock-llm.serviceAccountName" . }}
      {{- with .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            {{- if .Values.tls.enabled }}
            - name: MOCK_LLM_TLS_ENABLED
              value: "true"
            - name: MOCK_LLM_TLS_CERT
              value: /etc/mock-llm/tls/tls.crt
            - name: MOCK_LLM_TLS_KEY
              value: /etc/mock-llm/tls/tls.key
            {{- end }}
            {{- if .Values.ark.a2a.enabled }}
            {{- if .Values.ark.a2a.agentCardHost }}
            - name: AGENT_CARD_HOST
              value: {{ .Values.ark.a2a.agentCardHost | quote }}
            {{- end }}
            {{- if .Values.ark.a2a.agentCardPort }}
            - name: AGENT_CARD_PORT
              value: {{ .Values.ark.a2a.agentCardPort | quote }}
            {{- end }}
            {{- end }}
          {{- /*
            When TLS is enabled, force probes onto HTTPS by merging `scheme:
            HTTPS` into each probe's httpGet block. When disabled, emit probes
            as configured.
          */}}
          {{- $tlsScheme := dict }}
          {{- if .Values.tls.enabled }}
          {{- $tlsScheme = dict "httpGet" (dict "scheme" "HTTPS") }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml (mergeOverwrite (deepCopy .) $tlsScheme) | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml (mergeOverwrite (deepCopy .) $tlsScheme) | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml (mergeOverwrite (deepCopy .) $tlsScheme) | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if or .Values.config .Values.existingConfigMap }}
            - name: config
              mountPath: /app/mock-llm.yaml
              subPath: mock-llm.yaml
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/mock-llm/tls
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if or .Values.config .Values.existingConfigMap }}
        - name: config
          configMap:
            name: {{ .Values.existingConfigMap | default (include "mock-llm.fullname" .) }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.existingSecret | default (printf "%s-tls" (include "mock-llm.fullname" .)) }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
